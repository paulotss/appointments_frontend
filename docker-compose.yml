services:
  frontend-dev:
    profiles: ["dev"]
    build:
      context: .
      target: dev
    container_name: appointments-frontend-dev
    ports:
      - "${FRONTEND_DEV_PORT:-5173}:5173"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - /app/node_modules

  frontend-prod:
    profiles: ["prod"]
    build:
      context: .
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: appointments-frontend-prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${FRONTEND_PROD_PORT:-8080}:80"
